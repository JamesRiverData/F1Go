<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Populate Field After DateTime</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="datetime-local"],
        textarea {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .info {
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 12px;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
        }
        .status.info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Test - Populate Field After DateTime</h1>

    <div class="form-group">
        <label for="fieldId">Field ID:</label>
        <input type="text" id="fieldId" placeholder="e.g., 2a343662-3a2f-448d-8824-892ec19e51ce">
    </div>

    <div class="form-group">
        <label for="textValue">Text to Populate:</label>
        <textarea id="textValue" placeholder="Enter the text value to populate" rows="3"></textarea>
    </div>

    <div class="form-group">
        <label for="dateTime">Date & Time (Local Time):</label>
        <input type="datetime-local" id="dateTime">
    </div>

    <button onclick="setupPopulation()">Setup Population Schedule</button>

    <div id="status"></div>

    <div class="info">
        <strong>Instructions:</strong>
        <ul>
            <li>Enter the form field ID (name or id attribute)</li>
            <li>Enter the text you want to populate</li>
            <li>Select the date and time when the field should be populated</li>
            <li>Click "Setup Population Schedule"</li>
            <li>Check the console for debugging info</li>
        </ul>
    </div>

    <script>
        /**
         * Populates a form field with text only after a specified date/time
         *
         * @param {string} fieldId - The form field ID/name to populate
         * @param {string} textValue - The text to populate into the field
         * @param {string|Date} dateTime - The date/time after which to populate (Local Time)
         *                                 Format: "2026-06-12 17:00" or JavaScript Date object
         *
         * Example usage:
         * populateFieldAfterDateTime(
         *   '2a343662-3a2f-448d-8824-892ec19e51ce',
         *   'Special offer text',
         *   '2026-06-12 17:00'
         * );
         */
        function populateFieldAfterDateTime(fieldId, textValue, dateTime) {
            // Parse the dateTime parameter
            let targetDateTime;

            if (typeof dateTime === 'string') {
                // Parse string format: "2026-06-12 17:00" or "2026-06-12T17:00"
                targetDateTime = new Date(dateTime.replace(' ', 'T'));
            } else if (dateTime instanceof Date) {
                targetDateTime = dateTime;
            } else {
                console.error('populateFieldAfterDateTime: Invalid dateTime format');
                showStatus('Invalid dateTime format', 'error');
                return;
            }

            // Validate the parsed date
            if (isNaN(targetDateTime.getTime())) {
                console.error('populateFieldAfterDateTime: Could not parse dateTime:', dateTime);
                showStatus('Could not parse dateTime: ' + dateTime, 'error');
                return;
            }

            // Function to check and populate the field
            function checkAndPopulate() {
                const currentDateTime = new Date();

                // Check if current time is after the target time
                if (currentDateTime >= targetDateTime) {
                    // Find the form field
                    const field = document.querySelector(`input[name="${fieldId}"]`) ||
                                document.querySelector(`textarea[name="${fieldId}"]`) ||
                                document.getElementById(fieldId);

                    if (field) {
                        field.value = textValue;
                        console.log(`Field populated at ${currentDateTime.toLocaleString()}: "${textValue}"`);
                        showStatus(`✓ Field populated successfully at ${currentDateTime.toLocaleString()}`, 'success');
                        return true; // Successfully populated
                    } else {
                        console.warn(`populateFieldAfterDateTime: Field not found with ID: ${fieldId}`);
                        showStatus(`Field not found with ID: ${fieldId}. Make sure the field exists in the form.`, 'error');
                        return false;
                    }
                }

                return false; // Not yet time to populate
            }

            // Check immediately in case we're already past the target time
            if (checkAndPopulate()) {
                return;
            }

            // Calculate milliseconds until target time
            const now = new Date();
            const delayMs = targetDateTime.getTime() - now.getTime();

            if (delayMs > 0) {
                console.log(`populateFieldAfterDateTime: Scheduled to populate in ${Math.round(delayMs / 1000)} seconds`);
                showStatus(`✓ Scheduled to populate in ${Math.round(delayMs / 1000)} seconds (at ${targetDateTime.toLocaleString()})`, 'info');

                // Set a timeout to check at the target time
                setTimeout(function() {
                    checkAndPopulate();
                }, delayMs);

                // Also set an interval to check every 10 seconds in case the page is still open
                // This ensures population even if there are clock adjustments or timing issues
                const checkInterval = setInterval(function() {
                    if (checkAndPopulate()) {
                        clearInterval(checkInterval);
                    }
                }, 10000); // Check every 10 seconds
            } else {
                console.log('populateFieldAfterDateTime: Target time is in the past');
                showStatus('Target time is in the past. It would populate immediately if the field exists.', 'info');
            }
        }

        /**
         * Convenience wrapper for scheduling multiple field populations at once
         *
         * @param {Array} schedules - Array of objects with fieldId, textValue, and dateTime
         *
         * Example usage:
         * scheduleMultipleFieldPopulations([
         *   {
         *     fieldId: '2a343662-3a2f-448d-8824-892ec19e51ce',
         *     textValue: 'Offer 1',
         *     dateTime: '2026-06-12 17:00'
         *   },
         *   {
         *     fieldId: '09767c52-2824-4fa0-b91d-9c8fcbd93d0e',
         *     textValue: 'Offer 2',
         *     dateTime: '2026-06-15 14:30'
         *   }
         * ]);
         */
        function scheduleMultipleFieldPopulations(schedules) {
            if (!Array.isArray(schedules)) {
                console.error('scheduleMultipleFieldPopulations: Input must be an array');
                showStatus('Input must be an array', 'error');
                return;
            }

            schedules.forEach(function(schedule) {
                if (schedule.fieldId && schedule.textValue && schedule.dateTime) {
                    populateFieldAfterDateTime(schedule.fieldId, schedule.textValue, schedule.dateTime);
                } else {
                    console.warn('scheduleMultipleFieldPopulations: Invalid schedule object', schedule);
                }
            });
        }

        function setupPopulation() {
            const fieldId = document.getElementById('fieldId').value.trim();
            const textValue = document.getElementById('textValue').value.trim();
            const dateTimeInput = document.getElementById('dateTime').value;

            // Validate inputs
            if (!fieldId) {
                showStatus('Please enter a Field ID', 'error');
                return;
            }
            if (!textValue) {
                showStatus('Please enter text to populate', 'error');
                return;
            }
            if (!dateTimeInput) {
                showStatus('Please select a date and time', 'error');
                return;
            }

            // Convert datetime-local to a format populateFieldAfterDateTime can use
            // The datetime-local gives us "2026-06-12T17:00" format which is perfect
            console.log('Setting up population with:');
            console.log('  Field ID:', fieldId);
            console.log('  Text:', textValue);
            console.log('  DateTime:', dateTimeInput);

            populateFieldAfterDateTime(fieldId, textValue, dateTimeInput);
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
        }

        // Set default datetime to 2 minutes from now for testing
        window.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            now.setMinutes(now.getMinutes() + 2);
            const dateTimeString = now.toISOString().slice(0, 16);
            document.getElementById('dateTime').value = dateTimeString;
        });
    </script>
</body>
</html>
